# Model Cache Policy Configuration
# Contract: contracts/behaviors.md (ModelCache section)
#
# Three-Medium Architecture:
# - YAML: Policy values (this file)
# - Python: Cache mechanism (model_cache.py)
# - Markdown: Requirements (contracts/behaviors.md)

version: "1.0"

cache:
  # Time-to-live for disk cache (seconds)
  # Models don't change frequently — 24 hours is reasonable
  disk_ttl_seconds: 86400  # 24 hours

  # Maximum age before cache is considered completely invalid (seconds)
  # After this, cache is rejected even if TTL check is disabled
  max_stale_seconds: 604800  # 7 days

  # Cache file name (relative to cache directory)
  cache_filename: "models_cache.json"

# NOTE: No hardcoded model data here.
# This file contains POLICY values only — model data comes from SDK.
# Contract: behaviors:ModelDiscoveryError:MUST_NOT:1
