# Fake Tool Call Detection Policy
# Contract: provider-protocol.md (complete method)
#
# LLMs sometimes write tool calls as text instead of using
# structured tool calls. This config defines detection patterns
# and correction behavior.

version: "1.0"

# Maximum retry attempts when fake tool calls detected
max_correction_attempts: 2

# Regex patterns that indicate fake tool call text
# These are compiled as re.IGNORECASE
patterns:
  - '\[Tool Call:\s*\w+'
  - '<tool_used\s+name='
  - '<tool_result\s+name='

# Message appended to retry request
correction_message: >-
  You wrote tool calls as plain text instead of using the
  structured tool calling mechanism. Please use actual tool
  calls, not text representations of them.

# Logging configuration for debugging fake tool call detection
# Contract: behaviors:Logging:MUST:1-5
logging:
  # What to include in logs (for debugging which pattern matched and what LLM returned)
  log_matched_pattern: true       # Which regex triggered detection
  log_response_text: true         # The actual LLM response text
  log_response_text_limit: 500    # Truncate at N chars (0 = full, protects against huge responses)
  log_tool_calls: true            # Show tool_calls array (empty vs populated)
  log_correction_message: true    # Show what correction we sent on retry

  # Log levels for different events (per behaviors:Logging:MUST:1-3)
  level_on_detection: INFO        # When fake tool call detected
  level_on_retry: INFO            # When retry initiated
  level_on_success: INFO          # When correction succeeds
  level_on_exhausted: WARNING     # When max attempts reached
