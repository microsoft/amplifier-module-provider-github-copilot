# Observability Policy
# Contract: contracts/observability.md
#
# Controls event emission for provider hooks.
# Following PR-021 verbosity collapse: single flag, not tiered modes.
#
# Three-Medium Architecture: Event names and status values are POLICY,
# not mechanism. They belong here, not as Python string literals.

version: "1.0"

# Provider identifier (used in all events)
provider_name: github-copilot

# Event names (hook event types)
# These are the Amplifier hook event names emitted by the provider.
event_names:
  llm_request: "llm:request"
  llm_response: "llm:response"
  provider_retry: "provider:retry"

# Status values for llm:response events
status:
  ok: "ok"
  error: "error"

# Finish reason values (normalized from SDK)
# Contract: event-vocabulary.md — Provider normalizes to "tool_calls" (amplifier-core proto)
finish_reasons:
  tool_use: "tool_calls"  # SDK sends tool_use, we normalize to tool_calls
  end_turn: "end_turn"
  stop: "stop"
  length: "length"
  content_filter: "content_filter"

# Event emission (Amplifier hooks)
# Note: events.enabled removed - events are always on when observability is loaded.
# To disable events, don't subscribe to hooks.
events:
  # Contract: observability:Verbosity:MUST:1 — default OFF per security posture
  # WARNING: raw_payloads exposes full API payloads including potentially sensitive data.
  # Never enable in production. Use only for local debugging with non-sensitive test data.
  raw_payloads: false
