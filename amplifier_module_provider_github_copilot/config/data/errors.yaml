# Error Translation Policy
# Contract: contracts/error-hierarchy.md
# 
# This file defines SDK error → kernel error mappings.
# The Python code consumes this config; it does not hardcode mappings.
#
# See GOLDEN_VISION_V2.md for the target structure.

version: "1.0"

error_mappings:
  # P0: Circuit breaker - MUST be FIRST (before timeout pattern)
  # Prevents false positive match on "timeout" substring
  - sdk_patterns: ["CircuitBreakerError"]
    string_patterns: ["circuit breaker", "> max=", "Circuit breaker TRIPPED"]
    kernel_error: ProviderUnavailableError
    retryable: false

  - sdk_patterns: ["AuthenticationError", "InvalidTokenError", "PermissionDeniedError"]
    string_patterns: ["401", "403", "unauthorized", "permission denied"]
    kernel_error: AuthenticationError
    retryable: false

  - sdk_patterns: ["RateLimitError"]
    string_patterns: ["429", "rate limit"]
    kernel_error: RateLimitError
    retryable: true
    extract_retry_after: true

  - sdk_patterns: ["QuotaExceededError"]
    string_patterns: ["quota exceeded", "billing"]
    kernel_error: QuotaExceededError
    retryable: false

  - sdk_patterns: ["TimeoutError", "RequestTimeoutError"]
    string_patterns: ["timeout", "timed out", "Timeout after", "waiting for session"]
    kernel_error: LLMTimeoutError
    retryable: true

  - sdk_patterns: ["ContentFilterError", "SafetyError"]
    string_patterns: ["content filter", "safety", "blocked"]
    kernel_error: ContentFilterError
    retryable: false

  # Contract: error-hierarchy:ConnectionError:MUST:1
  # ConnectionError → ProviderUnavailableError (provider endpoint unreachable)
  # ProcessExitedError → NetworkError (raw process/transport failure)
  # These were previously grouped under NetworkError — that contradicted the contract.
  - sdk_patterns: ["ConnectionError"]
    string_patterns: ["connection refused", "connection error"]
    kernel_error: ProviderUnavailableError
    retryable: true

  - sdk_patterns: ["ProcessExitedError"]
    string_patterns: ["process exited"]
    kernel_error: NetworkError
    retryable: true

  - sdk_patterns: ["ModelNotFoundError"]
    string_patterns: ["model not found", "404"]
    kernel_error: NotFoundError
    retryable: false

  # P1: Context/token limit errors
  # SDK returns CAPIError: 400 for prompt length violations
  # Example: "prompt is too long: 208468 tokens > 200000 maximum"
  # NOTE: CAPIError removed from sdk_patterns to avoid shadowing image validation errors.
  # Context length CAPIErrors are caught by string_patterns instead.
  - sdk_patterns: ["ContextLengthError"]
    string_patterns: ["413", "token count", "exceeds the limit", "context length", "too many tokens", "prompt is too long", "tokens >", "> maximum"]
    kernel_error: ContextLengthError
    retryable: false

  # P2: Stream interruption errors
  - sdk_patterns: ["StreamError"]
    string_patterns: ["GOAWAY", "broken pipe", "connection reset", "stream terminated"]
    kernel_error: StreamError
    retryable: true

  # P3: Tool-related errors
  - sdk_patterns: ["InvalidToolCallError"]
    string_patterns: ["tool conflict", "fake tool", "missing tool result", "conflicts with a built-in"]
    kernel_error: InvalidToolCallError
    retryable: false
    # Context extraction for better debugging
    context_extraction:
      - pattern: "tool '([^']+)'"
        field: tool_name
      - pattern: "(built-in|external|missing)"
        field: conflict_type

  # P4: Model/provider configuration errors
  - sdk_patterns: ["ConfigurationError"]
    string_patterns: ["does not support", "configuration error", "not configured"]
    kernel_error: ConfigurationError
    retryable: false
    # Context extraction for better debugging
    context_extraction:
      - pattern: "model '([^']+)'"
        field: model_name
      - pattern: "feature '([^']+)'"
        field: feature_name

  # User abort errors - MUST NOT retry on user cancellation
  - sdk_patterns: ["AbortError", "CancelledError"]
    string_patterns: ["abort", "cancelled", "canceled", "user interrupt", "keyboard interrupt"]
    kernel_error: AbortError
    retryable: false

  # Session lifecycle errors - transient, can retry
  - sdk_patterns: ["SessionCreateError", "SessionInitError"]
    string_patterns: ["session create", "session init", "failed to create session"]
    kernel_error: ProviderUnavailableError
    retryable: true

  - sdk_patterns: ["SessionDestroyError", "SessionCloseError"]
    string_patterns: ["session destroy", "session close", "failed to destroy session"]
    kernel_error: ProviderUnavailableError
    retryable: true

  # Vision/Image input validation errors
  # SDK returns CAPIError: 400 when image MIME type is not supported
  # Example: "invalid request body, failed to validate schema: ... image_url ..."
  - sdk_patterns: ["CAPIError"]
    string_patterns: ["400 invalid request body", "image_url", "failed to validate schema"]
    kernel_error: InvalidRequestError
    retryable: false
    context_extraction:
      - pattern: "Reason: ([^,]+)"
        field: validation_reason
    # User message should indicate supported image formats

# Default fallback - conservative non-retryable per Golden Vision spec
# NOTE: Changed from retryable=true to retryable=false for unknown errors.
# The Golden Vision V2 spec's default is conservative non-retryable.
# This prevents spurious retries on genuinely broken requests.
default:
  kernel_error: ProviderUnavailableError
  retryable: false
