# config/retry.yaml
# Retry and resilience policy
# Contract: contracts/behaviors.md

version: "1.0"

retry:
  max_attempts: 3
  backoff:
    strategy: exponential_with_jitter
    base_delay_ms: 1000
    max_delay_ms: 30000
    jitter_factor: 0.1

streaming:
  event_queue_size: 256
  ttft_warning_ms: 5000
  max_gap_warning_ms: 5000
  max_gap_error_ms: 30000
